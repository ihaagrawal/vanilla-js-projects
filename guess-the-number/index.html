<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <button><a href="../homepage/index.html">Home</a></button>
    <div class="container">
        <h1>Guess the Number</h1>
        <p>Guess a number between 1 to 100. You have 10 guesses to guess the correct number.</p>

        <label for="guess">Guess the Number</label>
        <input id="guess" type="number">

        <button id="btn">Guess</button>

        <p id="prev">Previous Guess : </p>
        <p id="rem">Guesses Remaining : 10</p>
        <h2 id="message"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
